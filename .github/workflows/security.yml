name: security (reusable)

# Reusable security-scanning workflow — the SINGLE SOURCE OF TRUTH for IaC/security gating across the
# platform repos (CZID-310). Callers add a thin wrapper (see README) so every repo scans identically:
#   - gitleaks : secret scanning over git history (hard-fail on any leak)
#   - trivy    : vuln + IaC misconfig + secret (hard-fail on HIGH/CRITICAL; per-repo exceptions in .trivyignore)
#   - tflint   : OpenTofu/Terraform lint (hard-fail on errors; warnings reported)
#   - checkov  : deep IaC policy pass — OPT-IN via run_checkov. Report-only (soft-fail).
# When called, the jobs check out the CALLER's repo, so .trivyignore is read from the caller (per-repo
# baseline, per CZID-264: accept inherited, hard-fail on NEW). Pin callers to a tag (e.g. @v1).
#
# `prepare`: an optional caller command run before tflint + checkov (NOT trivy — trivy scans source, and
# the codegen pulls in build artifacts). Repos whose config is only complete after codegen (e.g. lambda
# packaging that generates variable declarations) pass it here. Repos with no codegen pass nothing.

on:
  workflow_call:
    inputs:
      run_checkov:
        description: "Also run the full Checkov policy pass (full-suite / prod check)"
        type: boolean
        default: false
      prepare:
        description: "Optional shell command run before the IaC scans (e.g. codegen)."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan git history for secrets
        run: gitleaks git . --redact --no-banner --exit-code 1

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # NO prepare here on purpose: trivy scans SOURCE. Running the caller's codegen would pull build
      # artifacts (node_modules, lambda zips) into the scan and flag their deps. tflint/checkov get prepare.
      - name: Trivy (vuln + misconfig + secret)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare (caller codegen, if any)
        if: ${{ inputs.prepare != '' }}
        shell: bash
        run: ${{ inputs.prepare }}
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
      - run: tflint --recursive --minimum-failure-severity=error --format compact

  checkov:
    if: ${{ inputs.run_checkov }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare (caller codegen, if any)
        if: ${{ inputs.prepare != '' }}
        shell: bash
        run: ${{ inputs.prepare }}
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli
